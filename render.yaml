services:
  # Backend Web Service
  - type: web
    name: citizen-ai-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # Frontend Static Site
  - type: static
    name: citizen-ai-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routingRules:
      - route: /*
        rewritePath: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://citizen-ai-backend.onrender.com
